name: 📥 TG Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 لینک پست تلگرام (مثال: https://t.me/channel/123)'
        required: true
        type: string

jobs:
  download:
    name: "📥 دانلود از تلگرام با yt-dlp"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yt-dlp
        run: |
          pip install yt-dlp

      - name: Download media from Telegram
        run: |
          echo "🌐 Downloading from: ${{ github.event.inputs.telegram_link }}"
          # yt-dlp automatically handles Telegram t.me links
          yt-dlp \
            --no-playlist \
            --write-info-json \
            --write-description \
            --embed-metadata \
            --output "downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.telegram_link }}"

      - name: Commit and push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git commit -m "📥 Download from Telegram: ${{ github.event.inputs.telegram_link }}"
            git push
          fi
